[workspace]
authors = ["rashid <muhammad.rashid@unito.it>"]
channels = ["robostack-kilted", "conda-forge"]
name = "advis"
platforms = ["linux-64"]
version = "0.1.0"

[activation.env]
PYTHONPATH = "${PIXI_PROJECT_ROOT}/src:${PYTHONPATH}"

[tasks]
replay = "python -m cam_recorder.replay"
view = "python -m cam_recorder.viewer"
test = "pytest tests/ -v"

[dependencies]
python = ">=3.11"
ros-kilted-rclpy = "*"
ros-kilted-sensor-msgs = "*"
ros-kilted-cv-bridge = "*"
ros-kilted-rosbag2-py = "*"
ros-kilted-rosbag2-storage-mcap = "*"
ros-kilted-ros-base = "*"
opencv = "*"
numpy = "*"
pytest = "*"
pyyaml = "*"
pillow = ">=12.2.0,<13"
pytorch = ">=2.10.0,<3"
torchvision = ">=0.25.0,<0.26"
scipy = ">=1.17.1,<2"
matplotlib = ">=3.10.8,<4"
plotly = ">=6.6.0,<7"
scikit-image = ">=0.26.0,<0.27"
scikit-learn = ">=1.8.0,<2"
tqdm = ">=4.67.3,<5"
pandas = ">=3.0.2,<4"

